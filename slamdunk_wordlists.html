<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlamDunk Wordlists</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --orange: #FF6B1A;
    --orange-dark: #cc4f00;
    --black: #0a0a0a;
    --dark: #141414;
    --panel: #1c1c1c;
    --border: #2e2e2e;
    --text: #f0ede6;
    --muted: #888;
    --green: #39d98a;
    --court-line: rgba(255, 107, 26, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Court lines background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(90deg, var(--court-line) 0px, transparent 1px, transparent 80px, var(--court-line) 81px),
      repeating-linear-gradient(0deg, var(--court-line) 0px, transparent 1px, transparent 80px, var(--court-line) 81px);
    pointer-events: none;
    z-index: 0;
  }

  /* Center circle */
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 320px;
    height: 320px;
    border: 2px solid var(--court-line);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 52px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }

  .ball-icon {
    width: 52px;
    height: 52px;
    animation: spin 12s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  h1 {
    font-family: 'Teko', sans-serif;
    font-size: clamp(48px, 8vw, 80px);
    font-weight: 700;
    line-height: 0.9;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  h1 span.slam { color: var(--orange); }
  h1 span.dunk { color: var(--text); }

  .tagline {
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 10px;
  }

  /* PANELS */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  @media (max-width: 640px) {
    .panels { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .panel.drag-over {
    border-color: var(--orange);
    box-shadow: 0 0 0 2px rgba(255,107,26,0.3);
  }

  .panel-header {
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-label {
    font-family: 'Teko', sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--orange);
  }

  .word-count {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .drop-zone {
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
    min-height: 160px;
  }

  .drop-zone:hover { background: rgba(255,107,26,0.04); }

  .drop-icon {
    opacity: 0.3;
    transition: opacity 0.2s;
  }
  .drop-zone:hover .drop-icon { opacity: 0.6; }

  .drop-text {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.5px;
  }

  .drop-text strong {
    display: block;
    font-size: 15px;
    color: var(--text);
    margin-bottom: 4px;
    font-weight: 600;
  }

  .file-input { display: none; }

  .loaded-file {
    padding: 20px;
    display: none;
  }

  .file-name {
    font-size: 13px;
    color: var(--orange);
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .word-preview {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
    max-height: 100px;
    overflow: hidden;
    mask-image: linear-gradient(to bottom, black 60%, transparent);
    word-break: break-all;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 10px;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    font-family: 'Barlow', sans-serif;
    text-transform: uppercase;
  }
  .clear-btn:hover { border-color: #e55; color: #e55; }

  /* ACTION */
  .action-row {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
  }

  .dunk-btn {
    background: var(--orange);
    color: var(--black);
    border: none;
    font-family: 'Teko', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 14px 60px;
    cursor: pointer;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
    transition: transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(255,107,26,0.35);
  }

  .dunk-btn::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 40%;
    height: 200%;
    background: rgba(255,255,255,0.2);
    transform: skewX(-20deg);
    transition: left 0.4s;
  }

  .dunk-btn:hover::before { left: 150%; }
  .dunk-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,107,26,0.5); }
  .dunk-btn:active { transform: translateY(0); }
  .dunk-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* RESULTS */
  .results {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: none;
    overflow: hidden;
  }

  .results-header {
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: gap;
    gap: 12px;
  }

  .results-label {
    font-family: 'Teko', sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .match-badge {
    background: var(--green);
    color: var(--black);
    font-family: 'Teko', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 2px;
  }

  .download-btn {
    background: none;
    border: 1.5px solid var(--green);
    color: var(--green);
    font-family: 'Teko', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 22px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .download-btn:hover { background: var(--green); color: var(--black); }

  .results-words {
    padding: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-height: 300px;
    overflow-y: auto;
  }

  .results-words::-webkit-scrollbar { width: 6px; }
  .results-words::-webkit-scrollbar-track { background: var(--dark); }
  .results-words::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .word-chip {
    background: rgba(57, 217, 138, 0.1);
    border: 1px solid rgba(57, 217, 138, 0.25);
    color: var(--green);
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 2px;
    font-weight: 500;
    animation: chipIn 0.3s ease both;
  }

  @keyframes chipIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }

  .no-match {
    padding: 40px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 1px;
  }

  /* OPTIONS */
  .options {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .option-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    letter-spacing: 0.5px;
  }

  .option-label input[type="checkbox"] {
    accent-color: var(--orange);
    width: 15px;
    height: 15px;
    cursor: pointer;
  }

  .option-label:hover { color: var(--text); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <svg class="ball-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="26" cy="26" r="24" fill="#FF6B1A" stroke="#cc4f00" stroke-width="2"/>
        <path d="M26 2 C26 2 26 50 26 50" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M2 26 C2 26 50 26 50 26" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M6 14 C16 18 20 26 16 38" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
        <path d="M46 14 C36 18 32 26 36 38" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <h1><span class="slam">Slam</span><span class="dunk">Dunk</span></h1>
    </div>
    <p class="tagline">Wordlist Comparator &mdash; Find Your Duplicates</p>
  </header>

  <div class="panels">
    <!-- Panel A -->
    <div class="panel" id="panelA">
      <div class="panel-header">
        <span class="panel-label">List A</span>
        <span class="word-count" id="countA">—</span>
      </div>
      <div class="drop-zone" id="dropA" onclick="document.getElementById('fileA').click()">
        <svg class="drop-icon" width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect x="4" y="4" width="28" height="28" rx="3" stroke="#f0ede6" stroke-width="2"/>
          <path d="M12 18h12M18 12v12" stroke="#f0ede6" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="drop-text">
          <strong>Drop .txt file here</strong>
          or click to browse
        </div>
      </div>
      <div class="loaded-file" id="loadedA">
        <div class="file-name" id="fileNameA">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 1h6l3 3v9H3V1z" stroke="#FF6B1A" stroke-width="1.2"/><path d="M9 1v3h3" stroke="#FF6B1A" stroke-width="1.2"/></svg>
          <span></span>
          <button class="clear-btn" onclick="clearFile('A')">Clear</button>
        </div>
        <div class="word-preview" id="previewA"></div>
      </div>
      <input type="file" class="file-input" id="fileA" accept=".txt" onchange="loadFile(this, 'A')">
    </div>

    <!-- Panel B -->
    <div class="panel" id="panelB">
      <div class="panel-header">
        <span class="panel-label">List B</span>
        <span class="word-count" id="countB">—</span>
      </div>
      <div class="drop-zone" id="dropB" onclick="document.getElementById('fileB').click()">
        <svg class="drop-icon" width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect x="4" y="4" width="28" height="28" rx="3" stroke="#f0ede6" stroke-width="2"/>
          <path d="M12 18h12M18 12v12" stroke="#f0ede6" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="drop-text">
          <strong>Drop .txt file here</strong>
          or click to browse
        </div>
      </div>
      <div class="loaded-file" id="loadedB">
        <div class="file-name" id="fileNameB">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 1h6l3 3v9H3V1z" stroke="#FF6B1A" stroke-width="1.2"/><path d="M9 1v3h3" stroke="#FF6B1A" stroke-width="1.2"/></svg>
          <span></span>
          <button class="clear-btn" onclick="clearFile('B')">Clear</button>
        </div>
        <div class="word-preview" id="previewB"></div>
      </div>
      <input type="file" class="file-input" id="fileB" accept=".txt" onchange="loadFile(this, 'B')">
    </div>
  </div>

  <!-- Options -->
  <div class="options">
    <label class="option-label">
      <input type="checkbox" id="caseInsensitive" checked>
      Case-insensitive comparison
    </label>
    <label class="option-label">
      <input type="checkbox" id="sortOutput" checked>
      Sort output A–Z
    </label>
    <label class="option-label">
      <input type="checkbox" id="trimWhitespace" checked>
      Trim whitespace
    </label>
  </div>

  <!-- Action -->
  <div class="action-row">
    <button class="dunk-btn" id="dunkBtn" onclick="findDuplicates()" disabled>
      🏀 SLAM DUNK IT
    </button>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-header">
      <div class="results-label">
        Duplicates
        <span class="match-badge" id="matchCount">0</span>
      </div>
      <button class="download-btn" onclick="downloadResults()">↓ Download .txt</button>
    </div>
    <div id="resultsBody"></div>
  </div>
</div>

<script>
  const words = { A: [], B: [] };
  let lastDuplicates = [];

  function loadFile(input, side) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const text = e.target.result;
      processText(text, side, file.name);
    };
    reader.readAsText(file);
  }

  function processText(text, side, filename) {
    let list = text.split(/\r?\n|,|\t/).map(w => w.trim()).filter(w => w.length > 0);
    words[side] = list;

    document.getElementById(`dropA` === `drop${side}` ? 'dropA' : `drop${side}`).style.display = 'none';
    document.getElementById(`drop${side}`).style.display = 'none';
    const loaded = document.getElementById(`loaded${side}`);
    loaded.style.display = 'block';

    document.getElementById(`fileName${side}`).querySelector('span').textContent = filename;
    document.getElementById(`preview${side}`).textContent = list.join(', ');
    document.getElementById(`count${side}`).textContent = list.length + ' words';

    checkReady();
  }

  function clearFile(side) {
    words[side] = [];
    document.getElementById(`drop${side}`).style.display = 'flex';
    document.getElementById(`loaded${side}`).style.display = 'none';
    document.getElementById(`file${side}`).value = '';
    document.getElementById(`count${side}`).textContent = '—';
    document.getElementById('results').style.display = 'none';
    checkReady();
  }

  function checkReady() {
    const ready = words.A.length > 0 && words.B.length > 0;
    document.getElementById('dunkBtn').disabled = !ready;
  }

  function findDuplicates() {
    const caseInsensitive = document.getElementById('caseInsensitive').checked;
    const sortOutput = document.getElementById('sortOutput').checked;
    const trim = document.getElementById('trimWhitespace').checked;

    let listA = words.A.map(w => trim ? w.trim() : w);
    let listB = words.B.map(w => trim ? w.trim() : w);

    const setB = new Set(listB.map(w => caseInsensitive ? w.toLowerCase() : w));

    let dups = [];
    const seen = new Set();
    for (const word of listA) {
      const key = caseInsensitive ? word.toLowerCase() : word;
      if (setB.has(key) && !seen.has(key)) {
        dups.push(word);
        seen.add(key);
      }
    }

    if (sortOutput) dups.sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
    lastDuplicates = dups;

    // Animate button
    const btn = document.getElementById('dunkBtn');
    btn.textContent = '🎯 DUNKED!';
    setTimeout(() => btn.textContent = '🏀 SLAM DUNK IT', 1500);

    renderResults(dups);
  }

  function renderResults(dups) {
    const resultsEl = document.getElementById('results');
    const body = document.getElementById('resultsBody');
    const matchCount = document.getElementById('matchCount');

    resultsEl.style.display = 'block';
    matchCount.textContent = dups.length;

    if (dups.length === 0) {
      body.innerHTML = '<div class="no-match">No duplicate words found between the two lists.</div>';
      return;
    }

    body.innerHTML = '<div class="results-words">' +
      dups.map((w, i) =>
        `<span class="word-chip" style="animation-delay:${Math.min(i * 20, 600)}ms">${escapeHtml(w)}</span>`
      ).join('') +
      '</div>';

    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function downloadResults() {
    if (!lastDuplicates.length) return;
    const content = lastDuplicates.join('\n');
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'slamdunk_duplicates.txt';
    a.click();
    URL.revokeObjectURL(url);
  }

  // Drag and drop
  ['A', 'B'].forEach(side => {
    const panel = document.getElementById(`panel${side}`);
    const dropZone = document.getElementById(`drop${side}`);

    panel.addEventListener('dragover', e => {
      e.preventDefault();
      panel.classList.add('drag-over');
    });
    panel.addEventListener('dragleave', () => panel.classList.remove('drag-over'));
    panel.addEventListener('drop', e => {
      e.preventDefault();
      panel.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.txt')) {
        const reader = new FileReader();
        reader.onload = ev => processText(ev.target.result, side, file.name);
        reader.readAsText(file);
      }
    });
  });
</script>
</body>
</html>
